# ============================================================
# EO Downstream Skills Taxonomy — Search Configuration
# ============================================================
# Each theme has:
#   - label     : display name used in the dashboard
#   - keywords  : exact / substring keyword triggers (case-insensitive)
#                 Includes English, Dutch (NL), Greek (EL),
#                 Portuguese (PT), and Italian (IT) terms
#   - queries   : natural-language queries for semantic (SBERT) search
#   - weight    : relative importance multiplier (1.0 = neutral)
#
# Multilingual notes:
#   - Dutch keywords are marked      # NL
#   - Greek keywords are marked      # EL
#   - Portuguese keywords are marked # PT
#   - Italian keywords are marked    # IT
#   - SBERT model (paraphrase-multilingual-MiniLM-L12-v2) handles
#     cross-lingual matching, so queries stay in English.
#   - Keywords provide an additional exact-match safety net for
#     language-specific terms the SBERT model might rank lower.
# ============================================================

