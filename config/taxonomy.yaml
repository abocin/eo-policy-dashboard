# ============================================================
# Scoring thresholds
# ============================================================
thresholds:
  valid_match: 0.50       # CrossEncoder score >= this → VALID EVIDENCE
  weak_match:  0.35       # CrossEncoder score >= this → WEAK EVIDENCE
  # below weak_match     → NOT RELEVANT

# ============================================================
# Semantic search settings
# ============================================================
search:
  # ── Search mode ──────────────────────────────────────────────────────────
  #
  # Mode A — OpenAI-only (default, recommended for Streamlit Cloud)
  #   use_sbert: false  |  use_openai: true
  #   RAM: ~200MB  |  No torch/model download  |  Requires OPENAI_API_KEY
  #   Cost: ~$0.01–0.05 per full 30-PDF corpus (text-embedding-3-small)
  #
  # Mode B — SBERT-only (offline, no API key needed)
  #   use_sbert: true  |  use_openai: false
  #   RAM: ~600MB  |  Downloads model on first run (~85MB)
  #
  # Mode C — Hybrid (best quality, needs >2GB RAM — run locally)
  #   use_sbert: true  |  use_cross_encoder: true  |  use_openai: true
  # ─────────────────────────────────────────────────────────────────────────
  use_sbert: false
  use_cross_encoder: false
  use_openai: true

  sbert_model: "all-MiniLM-L6-v2"
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  # top_k_sentences: max semantic hits returned per theme per document.
  # OpenAI embeddings are high quality so 5 is safe without RAM pressure.
  top_k_sentences: 5
  chunk_size: 400
  chunk_overlap: 80
  # Number of sentences to grab before and after each matched excerpt
  # for the "Show context" expander in the card view.
  # 2 = ~1 paragraph of context. Increase to 3-4 for more.
  context_window: 2


