[pytest]
# Default markers — declare them here to avoid PytestUnknownMarkWarning
markers =
    integration: Tests that load real SBERT / CrossEncoder models (slow, ~2min).
                 Run with: pytest -m integration
                 Skip with: pytest -m "not integration"

# Default test discovery
testpaths = tests

# Show extra test summary info for failures and skips
addopts = -ra --strict-markers

# Timeout (requires pytest-timeout) — prevents hanging model downloads in CI
timeout = 300
